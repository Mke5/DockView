name: Nightly Builds

# Trigger daily at midnight UTC
on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no changes'
        required: false
        default: 'false'
        type: boolean

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # Check if there are changes since last nightly build
  check-changes:
    name: Check for Changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
      build_reason: ${{ steps.changes.outputs.build_reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: changes
        run: |
          # Get the last successful nightly build
          LAST_BUILD=$(gh run list --workflow="Nightly Builds" --branch="main" --status=success --limit=1 --json=headBranch --jq '.[0].headBranch' 2>/dev/null || echo "")
          
          BUILD_REASON="scheduled"
          if [ "${{ github.event.inputs.force_build }}" == "true" ]; then
            BUILD_REASON="manual"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          elif [ -n "$LAST_BUILD" ]; then
            # Check if there are changes since last build
            if git diff --quiet $LAST_BUILD..HEAD -- .; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          
          echo "build_reason=$BUILD_REASON" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build nightly versions for all platforms
  build-nightly:
    name: Build Nightly (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
            bundle_formats: msi,nsis
            
          # macOS Intel
          - os: macos-latest
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
            bundle_formats: dmg,app
            
          # macOS Apple Silicon
          - os: macos-13
            platform: macos
            arch: aarch64
            target: aarch64-apple-darwin
            bundle_formats: dmg,app
            
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            bundle_formats: deb,appimage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
            node_modules
          key: ${{ runner.os }}-${{ matrix.target }}-nightly-${{ hashFiles('**/Cargo.lock', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-nightly-
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create nightly version
        run: |
          # Generate nightly version string
          NIGHTLY_VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> $GITHUB_ENV
          
          # Update version in package.json
          npm version $NIGHTLY_VERSION --no-git-tag-version
          
          # Update version in Cargo.toml
          cd src-tauri
          sed -i.bak "s/^version = .*/version = \"$NIGHTLY_VERSION\"/" Cargo.toml

      - name: Build Tauri app (Nightly)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: '--target ${{ matrix.target }} --bundles ${{ matrix.bundle_formats }}'

      - name: Rename artifacts with nightly version
        run: |
          NIGHTLY_VERSION=${{ env.NIGHTLY_VERSION }}
          for file in src-tauri/target/${{ matrix.target }}/release/bundle/*; do
            if [ -f "$file" ]; then
              extension="${file##*.}"
              basename=$(basename "$file" ".$extension")
              new_name="${basename}-nightly-${NIGHTLY_VERSION}.${extension}"
              mv "$file" "$(dirname "$file")/$new_name"
            fi
          done

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
            src-tauri/target/${{ matrix.target }}/release/dockview*
          retention-days: 7

  # Create nightly release
  create-nightly-release:
    name: Create Nightly Release
    runs-on: ubuntu-latest
    needs: [check-changes, build-nightly]
    if: needs.build-nightly.result == 'success'
    steps:
      - name: Download all nightly artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          merge-multiple: true
          path: nightly-artifacts

      - name: Generate nightly release notes
        run: |
          NIGHTLY_VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          BUILD_REASON="${{ needs.check-changes.outputs.build_reason }}"
          
          cat << EOF > nightly-release-notes.md
          ## 🌙 Dock Nightly Build - $NIGHTLY_VERSION
          
          **Build Reason**: $BUILD_REASON
          **Commit**: $(git rev-parse HEAD)
          **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ### ⚠️ Important Notice
          This is a **nightly build** and may contain:
          - Unstable features
          - Bugs and crashes
          - Incomplete functionality
          
          **For production use, please wait for stable releases.**
          
          ### 📦 Installation
          - **Windows**: Download the `.msi` installer
          - **macOS**: Download the `.dmg` file
          - **Linux**: Download the `.deb` package (for Debian/Ubuntu) or `.AppImage` (universal)
          
          ### 🔄 Auto-Update
          Nightly builds may update automatically to newer nightly versions.
          
          ### 🐛 Bug Reports
          Please report issues on [GitHub Issues](${{ github.server_url }}/${{ github.repository }}/issues) with the build version: $NIGHTLY_VERSION
          
          ---
          **Last updated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF
          
          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> $GITHUB_ENV

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: 🌙 Dock Nightly Build
          body_path: nightly-release-notes.md
          draft: false
          prerelease: true
          files: |
            nightly-artifacts/**/*.msi
            nightly-artifacts/**/*.exe
            nightly-artifacts/**/*.dmg
            nightly-artifacts/**/*.app
            nightly-artifacts/**/*.deb
            nightly-artifacts/**/*.AppImage
            nightly-artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update nightly channel
        run: |
          # This would update your nightly channel manifest
          # Implementation depends on your update server setup
          echo "Nightly channel updated with version $NIGHTLY_VERSION"

  # Cleanup old nightly artifacts
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    needs: [create-nightly-release]
    if: always() && needs.create-nightly-release.result == 'success'
    steps:
      - name: Delete old nightly artifacts
        uses: actions/github-script@v7
        with:
          script: |
            // Delete artifacts older than 7 days
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - 7);
            
            for (const artifact of artifacts.data.artifacts) {
              const createdDate = new Date(artifact.created_at);
              if (createdDate < cutoffDate && artifact.name.includes('nightly-')) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                console.log(`Deleted old artifact: ${artifact.name}`);
              }
            }

  # Notify about nightly build
  notify:
    name: Notify Nightly Build
    runs-on: ubuntu-latest
    needs: [check-changes, create-nightly-release]
    if: always() && (needs.create-nightly-release.result == 'success' || needs.check-changes.outputs.has_changes == 'false')
    steps:
      - name: Notify success
        if: needs.create-nightly-release.result == 'success'
        run: |
          NIGHTLY_VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          
          # Discord notification
          if [ -n "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            curl -H "Content-Type: application/json" -X POST -d '{
              "content": "🌙 **New nightly build available!**\n\nVersion: '$NIGHTLY_VERSION'\nDownload: https://github.com/${{ github.repository }}/releases/tag/nightly\n\n⚠️ This is a development build and may be unstable."
            }' "${{ secrets.DISCORD_WEBHOOK }}"
          fi
          
          # Slack notification
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"🌙 New nightly build available! Version: '$NIGHTLY_VERSION' - https://github.com/${{ github.repository }}/releases/tag/nightly"}' \
              "${{ secrets.SLACK_WEBHOOK }}"
          fi

      - name: Notify no changes
        if: needs.check-changes.outputs.has_changes == 'false'
        run: |
          echo "No changes detected since last nightly build. Skipping build."
          
          if [ -n "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            curl -H "Content-Type: application/json" -X POST -d '{
              "content": "🌙 **Nightly build skipped** - No changes detected since last build."
            }' "${{ secrets.DISCORD_WEBHOOK }}"
          fi

  # Performance metrics
  performance:
    name: Performance Metrics
    runs-on: ubuntu-latest
    needs: [build-nightly]
    if: needs.build-nightly.result == 'success'
    steps:
      - name: Collect build metrics
        run: |
          echo "## 📊 Nightly Build Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Build Time | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | ${{ needs.build-nightly.outputs.windows-time || 'N/A' }} | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Intel | ${{ needs.build-nightly.outputs.macos-x64-time || 'N/A' }} | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Apple Silicon | ${{ needs.build-nightly.outputs.macos-aarch64-time || 'N/A' }} | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | ${{ needs.build-nightly.outputs.linux-time || 'N/A' }} | ✅ |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Build Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Reason**: ${{ needs.check-changes.outputs.build_reason }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Build Time**: $(date +%s) - ${{ github.event.created_at }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts Retained**: 7 days" >> $GITHUB_STEP_SUMMARY
